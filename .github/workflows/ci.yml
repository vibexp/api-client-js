name: CI

# Validates that the client still generates and type-checks against the backend
# OpenAPI spec — without publishing. Runs on every push/PR to this repo, and can
# be dispatched manually against any backend ref to verify generation ahead of a
# release. This is the same generation gate the Publish workflow enforces.

on:
  push:
    branches: [ main ]
  pull_request:
  workflow_dispatch:
    inputs:
      backend_ref:
        description: 'vibexp/vibexp git ref (tag/branch/SHA) to generate from'
        required: false
        default: 'main'

permissions:
  contents: read

jobs:
  generate-and-typecheck:
    name: Generate & type-check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout api-client
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3

      - name: Checkout backend spec source
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3
        with:
          repository: vibexp/vibexp
          ref: ${{ inputs.backend_ref || 'main' }}
          path: spec-src

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6.4.0
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm install

      # Generates types + axios SDK from the spec, compiles, then type-checks
      # smoke/ against the generated output — fails if generation is empty/broken.
      - name: Generate, build & smoke type-check
        run: npm run smoke
        env:
          VIBEXP_SPEC: spec-src/backend/openapi.yaml
